name: Update Attack Data

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours (rate limit aware for 4 countries)
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit data files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main            # always use latest main

      - name: Pull latest main
        run: git pull origin main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch and parse tweets
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-tweets.js

      - name: Fetch DXB flight data
        env:
          OPENSKY_CLIENT_ID: ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
        run: node scripts/fetch-flights.js
        continue-on-error: true

      - name: Commit updated data files (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data-*.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update attack data"
            git push
          fi
