name: Update Attack Data

on:
  schedule:
    - cron: "0 8 * * *"   # once daily at 08:00 UTC (manual updates preferred)
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit data files back to repo
      actions: write           # needed to trigger deploy workflow

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main            # always use latest main

      - name: Pull latest main
        run: git pull origin main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch and parse tweets
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-tweets.js

      - name: Fetch DXB flight data (OpenSky)
        env:
          OPENSKY_CLIENT_ID: ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
        run: node scripts/fetch-flights.js
        continue-on-error: true

      - name: Fetch MCT/DOH flight data (OpenSky)
        env:
          OPENSKY_CLIENT_ID: ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
        run: node scripts/fetch-flights-mct-doh.js
        continue-on-error: true

      - name: Fetch flight data via FR24 (DXB, DWC, AUH, MCT, DOH)
        run: node scripts/fetch-flights-fr24.js
        continue-on-error: true

      - name: Commit updated data files (if changed)
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data-*.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update attack data"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"ref": "main"}' \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-pages.yml/dispatches"
